spring.datasource.url=jdbc:h2:mem:electroshop;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=swejal
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
server.port=8081

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow frontend dev server origins for CORS in controllers (adjust if needed)
# Comma-separated list supported: http://localhost:3000,http://localhost:3001
frontend.origin=http://localhost:3000,http://localhost:3001

# Hibernate dialect for H2 in MySQL compatibility mode
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
